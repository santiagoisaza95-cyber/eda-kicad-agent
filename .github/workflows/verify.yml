name: Verify Toolchain & Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install KiCad 9.x
      run: |
        sudo add-apt-repository ppa:kicad/kicad-9.0-releases
        sudo apt-get update
        sudo apt-get install -y kicad

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest kicad-python kigadgets
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Toolchain Verification
      run: |
        # Override config.json paths for Linux CI environment if needed, or use env vars
        python scripts/verify_toolchain.py

    - name: Run Pytest
      run: |
        pytest tests/
